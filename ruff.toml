# ruff.toml
extend-include = ["*.ipynb"]

[lint]
ignore = [
    "T201",   # Allow print statements
]

[lint.per-file-ignores]
"*.ipynb" = [
    #"E501",  # Allow longer lines in notebooks
    "E402",   # Allow imports not at top
    #"F401",   # Allow unused imports
    #"B018",   # Allow "useless" expressions
]
